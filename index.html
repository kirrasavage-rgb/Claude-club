<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f7f5f2; color: #1a1a2e; min-height: 100vh; }
textarea, input { font-family: 'DM Sans', sans-serif; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #f0ede8; }
::-webkit-scrollbar-thumb { background: #c9c2f0; border-radius: 2px; }
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.badge-flip { animation: flip 0.5s ease; }
@keyframes flip { 0%{transform:rotateY(0)} 50%{transform:rotateY(90deg)} 100%{transform:rotateY(0)} }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.pop-in { animation: popIn 0.35s ease; }
@keyframes popIn { 0%{opacity:0; transform:scale(0.92) translateY(8px)} 70%{transform:scale(1.03)} 100%{opacity:1; transform:scale(1) translateY(0)} }
.floaty { animation: floaty 4s ease-in-out infinite; }
@keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.shine { position: relative; overflow: hidden; }
.shine:after { content:''; position:absolute; top:0; left:-120%; width:80%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent); transform:skewX(-20deg); animation: shine 3.5s infinite; }
@keyframes shine { 0%{left:-120%} 45%,100%{left:140%} }
.confetti-dot { position: fixed; width: 8px; height: 8px; border-radius: 50%; z-index: 999; animation: confettiFall 900ms ease forwards; pointer-events:none; }
@keyframes confettiFall { 0%{opacity:1; transform:translateY(-20px) rotate(0deg)} 100%{opacity:0; transform:translateY(140px) rotate(240deg)} }
.badge-glow { animation: badgeGlow 2.4s ease-in-out infinite; }
@keyframes badgeGlow { 0%,100%{box-shadow:0 0 0 rgba(124,106,247,0)} 50%{box-shadow:0 0 18px rgba(124,106,247,.28)} }
.bounce-soft { animation: bounceSoft .45s ease; }
@keyframes bounceSoft { 0%{transform:scale(.96)} 55%{transform:scale(1.04)} 100%{transform:scale(1)} }
.tab-sparkle { animation: sparkleTab 1.8s ease-in-out infinite; }
@keyframes sparkleTab { 0%,100%{filter:saturate(1)} 50%{filter:saturate(1.8) brightness(1.12)} }
.celebration-backdrop { position: fixed; inset: 0; z-index: 6000; display:flex; align-items:center; justify-content:center; background: rgba(26,26,46,.38); backdrop-filter: blur(5px); pointer-events:auto; }
.celebration-card { background:#fff; width:min(340px, calc(100vw - 32px)); border-radius:26px; padding:26px 20px; text-align:center; box-shadow:0 24px 80px rgba(26,26,46,.25); animation: megaPop .65s cubic-bezier(.2,1.3,.35,1); border:2px solid #ede9ff; }
@keyframes megaPop { 0%{opacity:0; transform:scale(.65) rotate(-4deg)} 60%{opacity:1; transform:scale(1.06) rotate(2deg)} 100%{transform:scale(1) rotate(0)} }
.confetti-piece { position: fixed; top: -20px; width: 10px; height: 16px; border-radius: 3px; z-index: 6500; animation: confettiDrop 1.4s ease-out forwards; pointer-events:none; }
@keyframes confettiDrop { 0%{opacity:1; transform:translateY(-20px) rotate(0deg)} 100%{opacity:0; transform:translateY(105vh) rotate(720deg)} }
.avatar-photo-btn { display:inline-block; background:#fff; color:#7c6af7; border:1px solid #c9c2f0; border-radius:12px; padding:11px 13px; font-size:12px; font-weight:900; cursor:pointer; }

/* v9 stronger visible animations */
.page-enter-v9 { animation: pageEnterV9 .55s cubic-bezier(.2,1,.3,1); }
@keyframes pageEnterV9 { from { opacity:0; transform: translateY(18px) scale(.985); } to { opacity:1; transform: translateY(0) scale(1); } }
.welcome-back-v9 { position:fixed; inset:0; z-index:6100; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg, rgba(247,245,242,.94), rgba(237,233,255,.96)); animation: welcomeFadeInV9 .35s ease forwards; pointer-events:auto; }
@keyframes welcomeFadeInV9 { from{opacity:0} to{opacity:1} }
.welcome-card-v9 { background:#fff; border:2px solid #ede9ff; border-radius:28px; padding:28px 24px; width:min(360px, calc(100vw - 34px)); text-align:center; box-shadow:0 25px 80px rgba(26,26,46,.18); animation: welcomeCardV9 1.3s cubic-bezier(.2,1.3,.3,1); }
@keyframes welcomeCardV9 { 0%{transform:scale(.72) translateY(30px); opacity:0} 55%{transform:scale(1.06) translateY(0); opacity:1} 100%{transform:scale(1)} }
.stat-count-v9 { animation: countPopV9 .7s ease; }
@keyframes countPopV9 { 0%{transform:scale(.75); opacity:.25} 60%{transform:scale(1.12)} 100%{transform:scale(1); opacity:1} }

  min-height: 100vh;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 34px 24px;
  text-align: center;

.cc-orb.one { width:150px; height:150px; background:rgba(124,106,247,.16); top:8%; left:-54px; }
.cc-orb.two { width:120px; height:120px; background:rgba(247,106,138,.14); right:-42px; top:20%; animation-delay:1.2s; }
.cc-orb.three { width:190px; height:190px; background:rgba(106,247,184,.12); bottom:-72px; left:28%; animation-delay:2.1s; }
@keyframes ccFloat { 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-14px) scale(1.04); } }
.cc-hero-card {
  position: relative;
  width:min(420px, 100%);
  border: 1.5px solid rgba(255,255,255,.74);

  padding: 28px 22px 22px;
  animation: ccHeroIn .75s cubic-bezier(.18,1.1,.25,1);

.cc-logo-badge {
  width: 94px;
  height: 94px;
  margin: 0 auto 18px;
  border-radius: 30px;
  background: linear-gradient(145deg, #7c6af7, #6ab8f7);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: 0 18px 40px rgba(124,106,247,.34);
  animation: ccLogoPulse 3.8s ease-in-out infinite;
}
@keyframes ccLogoPulse { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-5px) rotate(2deg)} }
.cc-title {
  font-family: 'DM Serif Display', serif;
  font-size: 45px;
  line-height: 1;
  color:#111129;
  margin-bottom: 12px;
  letter-spacing:-.03em;
}
.cc-title span { color:#7c6af7; }
.cc-subtitle {
  font-size: 16px;
  color:#66668a;
  line-height:1.55;
  max-width: 320px;
  margin: 0 auto 18px;
}
.cc-pill-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin: 18px 0 22px; }
.cc-pill { font-size:11px; font-weight:900; letter-spacing:.04em; color:#5f55b8; background:#f2efff; border:1px solid #dcd5ff; border-radius:999px; padding:8px 10px; }
.cc-enter-btn {
  width:100%;
  border:none;
  border-radius:18px;
  padding:18px 22px;
  font-size:16px;
  font-weight:900;
  color:white;
  cursor:pointer;
  background: linear-gradient(135deg, #7c6af7 0%, #6ab8f7 100%);
  box-shadow: 0 16px 34px rgba(124,106,247,.28);
  transition: transform .18s ease, box-shadow .18s ease;
}
.cc-enter-btn:active { transform:scale(.98); }
.cc-enter-btn:hover { transform:translateY(-1px); box-shadow:0 20px 42px rgba(124,106,247,.34); }
.cc-mini-proof { margin-top:16px; font-size:12px; color:#8888aa; line-height:1.45; }
.cc-sparkline { position:absolute; inset:auto 18px 18px auto; opacity:.55; }

.card-pop-soft { animation: cardPopSoft .42s cubic-bezier(.2,1,.3,1); }
@keyframes cardPopSoft { from{ opacity:0; transform:translateY(10px) scale(.985); } to{ opacity:1; transform:translateY(0) scale(1); } }
.nudge-wiggle { animation: nudgeWiggle .55s ease; }
@keyframes nudgeWiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-2deg)} 70%{transform:rotate(2deg)} }
.wordle-win-soft { animation: wordleWinSoft .9s ease; }
@keyframes wordleWinSoft { 0%{box-shadow:0 0 0 0 rgba(106,247,184,.0)} 45%{box-shadow:0 0 0 12px rgba(106,247,184,.15)} 100%{box-shadow:0 0 0 0 rgba(106,247,184,.0)} }

@media (max-width: 430px) {
  body { overflow-x: hidden; }

.admin-table-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-top:1px solid #f0edf8; }
</style>

function autoBadgeLabelsFromNumbers(totalDays, streakDays, existingBadges) {
    const out = Array.isArray(existingBadges) ? [...existingBadges] : [];
    BADGES.forEach(b => {
        if (b.type === 'total' && Number(totalDays || 0) >= b.threshold && !out.includes(b.label))
            out.push(b.label);
        if (b.type === 'streak' && Number(streakDays || 0) >= b.threshold && !out.includes(b.label))
            out.push(b.label);
    });
    return out;
}
function visibleBadgesForMember(md) {

function wordleBadgeLabelsFromScores(scores, dailyLoggedToday = false) {
    const rows = (scores || []).filter(Boolean);
    const out = [];
    const solvedRows = rows.filter(r => !!r.solved);
    if (solvedRows.length >= 1)
        out.push('First Solve');
    if (solvedRows.some(r => Number(r.attempts) <= 2))
        out.push('Genius Guess');
    if (dailyLoggedToday && rows.some(r => r.word_date === todayStr()))
        out.push('Perfect Day');
    if (solvedRows.length >= 10)
        out.push('Club Brain');
    if (solvedRows.some(r => Number(r.attempts) === 6))
        out.push('Unlucky Genius');
    const days = [...new Set(rows.map(r => r.word_date).filter(Boolean))].sort().reverse();
    let streak = 0;
    let cursor = new Date(todayStr() + 'T00:00:00');
    for (const d of days) {
        const day = new Date(d + 'T00:00:00');
        const diff = Math.round((cursor - day) / 86400000);
        if (diff === 0 || diff === 1) {
            streak++;
            cursor = day;
            if (streak >= 7)
                break;
        }
        else {
            break;
        }
    }
    if (streak >= 7)
        out.push('Wordle Streak 7');
    return out;
}
async function awardWordleBadgesForMember(targetMemberId, options = {}) {
    try {
        const { data: scores } = await sb.from('wordle_scores').select('*').eq('member_id', targetMemberId);
        const { data: md } = await sb.from('members').select('badges,last_checkin').eq('id', targetMemberId).maybeSingle();
        if (!md)
            return [];
        const dailyLoggedToday = options.dailyLoggedToday || md.last_checkin === todayStr();
        const wordleLabels = wordleBadgeLabelsFromScores(scores || [], dailyLoggedToday);
        const old = Array.isArray(md.badges) ? md.badges : [];
        const badges = [...new Set([...old, ...wordleLabels])];
        const changed = badges.length !== old.length || badges.some(b => !old.includes(b));
        if (changed)
            await sb.from('members').update({ badges }).eq('id', targetMemberId);
        return wordleLabels;
    }
    catch (e) {
        console.warn('Wordle badge award skipped:', e.message || e);
        return [];
    }
}

function isValidWordleGuess(word) {
    const w = String(word || '').trim().toUpperCase();

function getWordleProgressKey(memberId, dateStr) {
    return `claudeClubWordleProgress:${memberId}:${dateStr}`;
}
function saveWordleProgress(memberId, dateStr, target, guesses) {
    try {
        localStorage.setItem(getWordleProgressKey(memberId, dateStr), JSON.stringify({ target, guesses, savedAt: new Date().toISOString() }));
    }
    catch (e) { }
}
function loadWordleProgress(memberId, dateStr, target) {
    try {
        const raw = localStorage.getItem(getWordleProgressKey(memberId, dateStr));
        if (!raw)
            return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.target !== target || !Array.isArray(parsed.guesses))
            return null;
        return parsed.guesses.filter(g => typeof g === 'string' && g.length === 5).map(g => g.toUpperCase()).slice(0, 5);
    }
    catch (e) {
        return null;
    }
}
function clearWordleProgress(memberId, dateStr) {
    try {
        localStorage.removeItem(getWordleProgressKey(memberId, dateStr));
    }
    catch (e) { }
}
function getDailyWord() {
    // Use local device date so everyone gets one puzzle per local day.
    const start = new Date(2026, 0, 1);
    const now = new Date();
    const localMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = Math.floor((localMidnight - start) / 86400000);
    const idx = ((diff % FIVE_LETTER_WORDS.length) + FIVE_LETTER_WORDS.length) % FIVE_LETTER_WORDS.length;
    return FIVE_LETTER_WORDS[idx];
}
